system:
  batch_size: 140
  cycle_interval_hours: 6
  profiler:
    min_fit_score: 0.0
    concurrent_scrapes: 5
    site_crawl:
      max_pages: 15
      max_depth: 2
  craft:
    require_manual_approval: false
  outreach:
    dry_run: false
    weekly_send_target: 1000
  hunter:
    use_paid_leadscraper: false
    # Verify exact actor ID if pipelinelabs/lead-scraper changes
    leadscraper_actor_id: "pipelinelabs/lead-scraper"
    weekly_lead_target: 1000
    use_jobboard_signals: true
    use_crunchbase: true
    use_directories: true

  signals:
    reddit:
      enabled: true
      subreddits: ["sysadmin", "devops", "cybersecurity", "SaaS", "startups"]
      poll_interval_minutes: 30
      keywords: ["need a developer", "looking for an agency", "AI agent", "security audit", "pentest", "SOC2", "automate our", "hire a contractor", "recommend a dev shop"]
      lookback_hours: 2
