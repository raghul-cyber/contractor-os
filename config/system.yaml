system:
  batch_size: 20
  cycle_interval_hours: 6
  profiler:
    min_fit_score: 0.3
    concurrent_scrapes: 5
    site_crawl:
      max_pages: 15
      max_depth: 2
  craft:
    require_manual_approval: true
  outreach:
    dry_run: false
    weekly_send_target: 500
  hunter:
    use_paid_leadscraper: false
    # Verify exact actor ID if pipelinelabs/lead-scraper changes
    leadscraper_actor_id: "pipelinelabs/lead-scraper"
    weekly_lead_target: 100
    use_jobboard_signals: true
    use_crunchbase: true
    use_directories: true
