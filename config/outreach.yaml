sequence:
  follow_up_intervals_days: [5, 10, 15]

max_follow_ups: 3
daily_send_limit: 20
send_window_hours: [9, 18]
randomize_send_time: true

reply_detection:
  imap_poll_interval_minutes: 120
  
positive_keywords:
  - "interested"
  - "let's talk"
  - "call"
  - "meeting"
  - "sounds good"
  
negative_keywords:
  - "unsubscribe"
  - "not interested"
  - "take me off"
  - "remove"
  
notifications:
  telegram_bot_token: ""
  telegram_chat_id: ""
  discord_webhook: ""
