version: '3.8'

services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./config:/app/config
      # data/ volume: contains contractor_os.db and its WAL-mode sidecar files
      # (-wal, -shm). All three live in the same directory, so this single
      # mount ensures they persist correctly across container restarts.
      - ./data:/app/data
      - ./logs:/app/logs
      - ./backups:/app/backups

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    profiles:
      - n8n
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  ollama_data:
  n8n_data:
