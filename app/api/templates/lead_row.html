<tr class="border-b hover:bg-gray-50 text-sm">
    <td class="p-2">
        <a href="{{ lead.website or '#' }}" target="_blank" class="text-blue-600 hover:underline">
            {{ lead.company_name }}
        </a>
    </td>
    <td class="p-2">
        <span class="px-2 py-1 rounded text-xs font-semibold
            {% if lead.status == 'RAW' %}bg-gray-200 text-gray-800
            {% elif lead.status == 'DRAFTED' %}bg-yellow-200 text-yellow-800
            {% elif lead.status == 'SENT' %}bg-blue-200 text-blue-800
            {% elif lead.status == 'REPLIED' %}bg-green-200 text-green-800
            {% elif lead.status == 'LOW_FIT' %}bg-red-200 text-red-800
            {% else %}bg-gray-100 text-gray-600{% endif %}">
            {{ lead.status }}
        </span>
    </td>
    <td class="p-2">{{ (lead.fit_score or 0) | round(2) }}</td>
    <td class="p-2 text-gray-500">{{ lead.updated_at[:10] }}</td>
    <td class="p-2">
        {% if lead.status == 'DRAFTED' %}
        <button 
            hx-post="/api/leads/{{ lead.id }}/approve-sequence" 
            hx-target="closest tr" 
            hx-swap="outerHTML" 
            hx-on::after-request="if(event.detail.successful) htmx.ajax('GET', '/ui/leads/{{ lead.id }}/row', {target: this.closest('tr'), swap: 'outerHTML'})"
            class="bg-green-500 hover:bg-green-600 text-white px-2 py-1 rounded text-xs shadow">
            Approve Draft
        </button>
        {% endif %}
    </td>
</tr>
