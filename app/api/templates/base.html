<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ContractorOS Dashboard</title>
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <!-- Tailwind CSS (Minimal) -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800 font-sans">
    <nav class="bg-blue-600 text-white shadow-md p-4">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">ContractorOS</h1>
            <div class="space-x-4">
                <button hx-post="/api/run/trigger" hx-swap="none" class="bg-blue-500 hover:bg-blue-700 px-4 py-2 rounded text-sm font-semibold" onclick="alert('Cycle triggered!')">
                    Trigger Cycle
                </button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-4 mt-6">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
